<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pagina no encontrada</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #f5f8fc; color: #1f334d; }
    .wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .card { max-width: 560px; width: 100%; background: #fff; border: 1px solid #d7e0eb; border-radius: 12px; padding: 28px; text-align: center; }
    h1 { margin: 0 0 8px; font-size: 28px; color: #0f2744; }
    p { margin: 0 0 18px; line-height: 1.5; }
    a { display: inline-block; padding: 10px 16px; border-radius: 8px; text-decoration: none; color: #fff; background: #1f5ed4; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Error 404</h1>
      <p>La pagina que buscas no existe o fue movida.</p>
      <a href="/">Volver al inicio</a>
    </div>
  </div>
</body>
</html>
