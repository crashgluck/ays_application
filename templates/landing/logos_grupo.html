{% load static %}
<section class="landing-section landing-logos">
    <div class="container">
        <div class="landing-section-head text-center">
            <h2>Comunidades</h2>
            <p>Proyectos y comunidades donde estamos operando.</p>
        </div>
        <div class="row landing-logo-grid">
            <div class="col-sm-4 col-xs-12">
                <div class="landing-logo-card">
                    <img loading="lazy" decoding="async" src="{% static 'images/logos/LDE-logotipo-2.webp' %}" alt="Logotipo Lomas del Embalse" class="img-responsive center-block">
                </div>
            </div>
            <div class="col-sm-4 col-xs-12">
                <div class="landing-logo-card">
                    <img loading="lazy" decoding="async" src="{% static 'images/logos/Recurso-2@2x.webp' %}" alt="Logotipo Cumbres del Tebal" class="img-responsive center-block">
                </div>
            </div>
            <div class="col-sm-4 col-xs-12">
                <div class="landing-logo-card">
                    <img loading="lazy" decoding="async" src="{% static 'images/logos/logo_foresta.webp' %}" alt="Logotipo La Foresta" class="img-responsive center-block">
                </div>
            </div>
        </div>
    </div>
</section>
